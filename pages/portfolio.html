<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Portfolio</title>

    <link rel="stylesheet" href="../css/portfolio.css">
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>

    <div id="header"></div>

    <section class="portfolio">
        <h1>PORTFOLIO</h1>
        <p class="subtitle">Explore our collection of professional photography work</p>

        <div class="filters" id="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Wedding">Wedding</button>
            <button class="filter-btn" data-filter="Pre-Wedding">Pre-Wedding</button>
            <button class="filter-btn" data-filter="Modal Shoot">Modal Shoot</button>
            <button class="filter-btn" data-filter="Event">Event</button>
            <button class="filter-btn" data-filter="Commercial">Commercial</button>
        </div>

        <div class="gallery" id="portfolio-gallery">
            </div>
    </section>

    <div id="footer"></div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    
    <script src="../js/portfolio.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
