<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Register UI</title>
  <link rel="stylesheet" href="../css/Admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container" id="container">
  <!-- SIGN UP FORM (Register) -->
  <div class="form-container sign-up-container">
    <form action="#">
      <h2>Register</h2>
      
      <div class="field">
        <input placeholder="Username">
        <span><i class="fa-solid fa-user"></i></span>
      </div>

      <div class="field">
        <input placeholder="Email">
        <span><i class="fa-solid fa-envelope"></i></span>
      </div>

      <div class="field">
        <input type="password" placeholder="Password">
        <span><i class="fa-solid fa-lock"></i></span>
      </div>

      <button class="btn">Register</button>
      <p class="account-text">Already have an account? <a href="#" id="signInLink">Sign In</a></p>
    </form>
  </div>

  <!-- SIGN IN FORM (Login) -->
  <div class="form-container sign-in-container">
    <form action="#">
      <h2>Login</h2>

      <div class="field">
        <input placeholder="Username">
        <span><i class="fa-solid fa-user"></i></span>
      </div>

      <div class="field">
        <input type="password" placeholder="Password">
        <span><i class="fa-solid fa-lock"></i></span>
      </div>

      <button class="btn">Login</button>
      <p class="account-text">Don't have an account? <a href="#" id="signUpLink">Sign Up</a></p>
    </form>
  </div>

  <!-- OVERLAY CONTAINER -->
  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-left">
         <h1>Welcome!</h1>
        <p>Enter your personal details and start your journey with us</p>
      </div>
      <div class="overlay-panel overlay-right">
        <h1>Welcome Back!</h1>
        <p>To keep connected with us please login with your personal info</p>
      </div>
    </div>
  </div>
</div>

<script src="../js/Admin.js"></script>
</body>
</html>
