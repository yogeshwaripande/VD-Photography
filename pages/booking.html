<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photographer Bookings | Lens Studio Admin</title>

    <link rel="stylesheet" href="../css/adminheader.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/booking.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    
</head>

<body>

    <nav class="navbar">
        <button type="button" class="nav-item" onclick="window.location.href='../pages/manage_portfolio.html'">📸 Photos</button>
        <button type="button" class="nav-item" onclick="window.location.href='../admin-panel/pages/index.html'">📄 Bills & Quotations</button>
        <button type="button" class="nav-item" onclick="window.location.href='../frontend/orders.html'">💰 Orders & Expenses</button>
        <button type="butorders.htmlton" class="nav-item active">📅 Bookings</button>
        <button type="button" class="nav-item" onclick="window.location.href='../frontend/all-orders.html'">💰 All Orders</button>
    </nav>

    <div class="main-container">
        
        <header class="header">
            <h2><i class="fa-solid fa-camera-retro"></i> Photographer Bookings</h2>
            <div class="header-actions">
                <button id="toggleViewBtn" class="btn btn-outline">
                    <i class="fa-regular fa-calendar"></i> <span id="viewBtnText">Switch View</span>
                </button>
                <button id="newBookingBtn" class="btn btn-black">
                    <i class="fa-solid fa-plus"></i> NEW BOOKING
                </button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card dark">
                <div class="stat-icon"><i class="fa-solid fa-layer-group"></i></div>
                <div class="stat-info">
                    <div class="label">Total Bookings</div>
                    <div class="value" id="statTotal">0</div>
                </div>
            </div>
            <div class="stat-card blue">
                <div class="stat-icon"><i class="fa-regular fa-clock"></i></div>
                <div class="stat-info">
                    <div class="label">Pending</div>
                    <div class="value" id="statPending">0</div>
                </div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-icon"><i class="fa-solid fa-check-double"></i></div>
                <div class="stat-info">
                    <div class="label">Confirmed</div>
                    <div class="value" id="statConfirmed">0</div>
                </div>
            </div>
            <div class="stat-card green">
                <div class="stat-icon"><i class="fa-solid fa-thumbs-up"></i></div>
                <div class="stat-info">
                    <div class="label">Completed</div>
                    <div class="value" id="statCompleted">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-indian-rupee-sign"></i></div>
                <div class="stat-info">
                    <div class="label">Est. Revenue</div>
                    <div class="value" id="statRevenue">₹0</div>
                </div>
            </div>
            <div class="stat-card green-border">
                <div class="stat-icon"><i class="fa-solid fa-wallet"></i></div>
                <div class="stat-info">
                    <div class="label">Advance Rec.</div>
                    <div class="value" id="statAdvance">₹0</div>
                </div>
            </div>
        </div>

        <section class="filters-container">
            <div class="filters-header">
                <i class="fa-solid fa-filter"></i> Filters
            </div>
            <div class="filters-form">
                <input type="text" id="filterCustomer" placeholder="Search Customer">
                <input type="text" id="filterPhotographer" placeholder="Search Photographer">
                <select id="filterStatus">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <input type="date" id="filterDateFrom">
                <input type="date" id="filterDateTo">
            </div>
            <button id="clearFiltersBtn" class="btn btn-small">Clear Filters</button>
        </section>

        <h3 class="booking-list-heading"><i class="fa-solid fa-list"></i> Booking Details</h3>

        <div id="listViewContainer" class="view-container">
        </div>

        <div id="calendarViewContainer" class="view-container hidden">
            <div class="calendar-layout">
                <div class="calendar-sidebar">
                    <h3>Select Date</h3>
                    <input type="date" id="calendarDateInput" class="full-width-input">
                    <h4 class="mt-20">Bookings on this day</h4>
                    <div id="calendarDayList" class="schedule-grid-single"></div>
                </div>
                <div class="calendar-main">
                    <h3>Photographer Schedules</h3>
                    <div id="calendarMainGrid"></div>
                </div>
            </div>
        </div>

    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <form id="bookingForm">
                <input type="hidden" name="id">
                <input type="hidden" name="createdDate">
                
                <div class="booking-form-head">
                    <h3 class="booking-form-title">
                        <i class="fa-solid fa-calendar-plus"></i>
                        <span id="modalTitle">New Booking</span>
                    </h3>
                    <button type="button" class="booking-form-close close-modal" aria-label="Close form">&times;</button>
                </div>

                <div class="form-grid">
                    <div class="form-section">
                        <h4 class="section-heading"><i class="fa-solid fa-calendar-check"></i> Booking Information</h4>
                        
                        <div class="input-group">
                            <label>Booking No. *</label>
                            <input type="text" name="bookingNo" class="readonly" readonly>
                        </div>

                        <div class="input-group">
                            <label>Event Type *</label>
                            <select name="eventType" required>
                                <option value="">Select Type</option>
                                <option value="Wedding">Wedding</option>
                                <option value="Pre-Wedding">Pre-Wedding</option>
                                <option value="Corporate">Corporate</option>
                                <option value="Birthday">Birthday</option>
                                <option value="Maternity">Maternity</option>
                                <option value="Portrait">Portrait</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Date *</label>
                            <input type="date" name="date" required>
                        </div>

                        <div class="row-2">
                            <div class="input-group">
                                <label>Start Time *</label>
                                <div class="time-selector-group" data-target="startTime">
                                    <select class="time-h"></select>
                                    <select class="time-m"></select>
                                    <select class="time-ampm"><option value="AM">AM</option><option value="PM">PM</option></select>
                                </div>
                                <input type="hidden" name="startTime" required>
                            </div>
                            <div class="input-group">
                                <label>End Time *</label>
                                <div class="time-selector-group" data-target="endTime">
                                    <select class="time-h"></select>
                                    <select class="time-m"></select>
                                    <select class="time-ampm"><option value="AM">AM</option><option value="PM">PM</option></select>
                                </div>
                                <input type="hidden" name="endTime" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Location *</label>
                            <input type="text" name="location" required placeholder="e.g. Hotel Grand">
                        </div>

                        <div class="input-group">
                            <label>Full Address *</label>
                            <textarea name="locationAddress" rows="2" required placeholder="Full venue address..."></textarea>
                        </div>

                        <div class="input-group">
                            <label>Status</label>
                            <select name="status">
                                <option value="pending">Pending</option>
                                <option value="confirmed">Confirmed</option>
                                <option value="completed">Completed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4 class="section-heading"><i class="fa-solid fa-user"></i> Customer & Team</h4>
                        
                        <div class="input-group">
                            <label>Customer ID *</label>
                            <input type="text" name="customerId" class="readonly" readonly>
                        </div>

                        <div class="input-group">
                            <label>Customer Name *</label>
                            <input type="text" name="customerName" required placeholder="Full Name">
                        </div>

                        <div class="separator"></div>

                        <div class="input-group">
                            <label>Main Photographer *</label>
                            <input type="text" name="photographerName" required placeholder="Name">
                        </div>

                        <div class="input-group">
                            <label>Photographer Whatsapp Number</label>
                            <input type="tel" name="photographerWhatsapp" pattern="[0-9]{10}" placeholder="10-digit Number" title="Please enter a valid 10-digit number">
                        </div>

                        <div class="input-group">
                            <label>Services</label>
                            <div class="multi-select" id="servicesDropdown">
                                <button type="button" class="multi-select-trigger" id="servicesTrigger" aria-expanded="false">
                                    <span id="servicesSummary">Select services</span>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>
                                <div class="multi-select-menu" id="servicesMenu">
                                    <label class="multi-select-option"><input type="checkbox" name="services" value="Photography"> <span>Photography</span></label>
                                    <label class="multi-select-option"><input type="checkbox" name="services" value="Videography"> <span>Videography</span></label>
                                    <label class="multi-select-option"><input type="checkbox" name="services" value="Drone Shoot"> <span>Drone Shoot</span></label>
                                    <label class="multi-select-option"><input type="checkbox" name="services" value="Album Design"> <span>Album Design</span></label>
                                    <label class="multi-select-option"><input type="checkbox" name="services" value="Pre-Wedding Shoot"> <span>Pre-Wedding Shoot</span></label>
                                    <label class="multi-select-option"><input type="checkbox" name="services" value="LED Setup"> <span>LED Setup</span></label>
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Assistants</label>
                            <div class="assistants-wrapper">
                                <div class="assistants-input-row">
                                    <input type="text" id="newAssistantName" placeholder="Assistant Name">
                                    <button type="button" id="addAssistantBtn" class="btn btn-small btn-black">Add</button>
                                </div>
                                <ul id="assistantsList" class="assistants-list"></ul>
                            </div>
                            <input type="hidden" name="assistants">
                        </div>
                    </div>
                </div>

                <div class="form-section full-width">
                    <h4 class="section-heading"><i class="fa-solid fa-list-check"></i> Logistics & Finance</h4>
                    
                    <div class="input-group">
                        <label>Equipment Needed</label>
                        <div class="checkbox-grid">
                            <label class="check-box"><input type="checkbox" name="equipment" value="Drone"> Drone</label>
                            <label class="check-box"><input type="checkbox" name="equipment" value="Flash"> Flash Kit</label>
                            <label class="check-box"><input type="checkbox" name="equipment" value="Gimbal"> Gimbal</label>
                            <label class="check-box"><input type="checkbox" name="equipment" value="Tripod"> Tripod</label>
                            <label class="check-box"><input type="checkbox" name="equipment" value="Lens Kit"> Lens Kit</label>
                            <label class="check-box"><input type="checkbox" name="equipment" value="Backdrop"> Backdrop</label>
                            <label class="check-box"><input type="checkbox" name="equipment" value="Reflector"> Reflector</label>
                            <label class="check-box"><input type="checkbox" name="equipment" value="Softbox"> Softbox</label>
                        </div>
                    </div>

                    <div class="row-2">
                        <div class="input-group">
                            <label>Estimated Cost (₹)</label>
                            <input type="number" name="estimatedCost" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label>Advance Paid (₹)</label>
                            <input type="number" name="advancePaid" min="0" placeholder="0">
                            <ul id="paymentHistoryList" class="assistants-list" style="margin-top: 5px;"></ul>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Special Requests</label>
                        <textarea name="specialRequests" rows="2" placeholder="Client requests..."></textarea>
                    </div>
                </div>

                <div class="booking-form-actions">
                    <button type="button" class="btn btn-outline close-modal-btn">Cancel</button>
                    <button type="submit" class="btn btn-black">Save Booking</button>
                </div>
            </form>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content view-content">
            <div class="modal-header">
                <h3>Booking Details</h3>
                <span class="close-view-modal">&times;</span>
            </div>
            <div id="viewDetailsBody">
                </div>
        </div>
    </div>

    <template id="bookingCardTemplate">
        <div class="booking-card">
            <div class="card-header">
                <div>
                    <span class="t-booking-no header-id"></span>
                    <span class="t-status status-badge"></span>
                    <div class="t-customer-sub header-sub"></div>
                </div>
                <div class="text-right">
                    <div class="t-cost header-cost"></div>
                    <div class="t-advance header-sub"></div>
                </div>
            </div>
            <div class="card-body">
                <div class="info-block">
                    <h4><i class="fa-solid fa-camera"></i> Photographer</h4>
                    <p class="t-photographer"></p>
                    <p class="t-assistants text-muted small"></p>
                </div>
                <div class="info-block">
                    <h4><i class="fa-solid fa-clock"></i> Schedule</h4>
                    <p class="t-date"></p>
                    <p class="t-time"></p>
                    <p class="t-type bold"></p>
                </div>
                <div class="info-block">
                    <h4><i class="fa-solid fa-location-dot"></i> Location</h4>
                    <p class="t-location"></p>
                    <div class="action-row">
                        <button class="btn btn-small btn-outline btn-view" title="View"><i class="fa-solid fa-eye"></i></button>
                        <button class="btn btn-small btn-outline btn-edit" title="Edit"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-small btn-delete text-red" title="Delete"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="../js/booking.js"></script>
    
</body>
</html>
