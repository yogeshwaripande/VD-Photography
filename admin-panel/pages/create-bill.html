

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="docTitle">New Quotation | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/create-bill.css">
</head>
<body>

<div class="container">
    <div style="margin-bottom: 20px;">
        <button onclick="window.location.href='index.html'" style="background: #f4f4f4; border: 1px solid #ddd; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: 500;">
            <i class="fas fa-arrow-left"></i> BACK
        </button>
    </div>

    <div class="form-header">
        <div class="header-main" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="pageTitle" style="margin:0;"><i class="fas fa-file-invoice" style="color:#007bff;"></i> New Quotation</h2>
            <div class="qtn-number-box" style="text-align: right;">
                <label id="noLabel" style="font-weight:bold; font-size: 12px; color: #666; display: block;">QUOTATION NO</label>
                <input type="text" id="qtnNo" readonly style="font-weight:bold; border:none; text-align:right; padding:0; background:transparent; width:100px; font-size:16px;">
            </div>
        </div>
        <p id="pageSubTitle" style="color:#666; margin-top:5px;">Create a professional quotation for your clients.</p>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="form-section">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <div><label>Customer ID *</label><input type="text" id="custId" placeholder="e.g. CUST-555"></div>
            <div><label>Customer Name *</label><input type="text" id="custName" placeholder="Full Name"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <div><label>Email *</label><input type="email" id="email" placeholder="client@example.com"></div>
            <div><label>Phone *</label><input type="text" id="phone" placeholder="Mobile Number"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <div>
                <label>Event Type *</label>
                <select id="eventType">
                    <option value="">Select Event</option>
                    <option>Wedding</option><option>Birthday</option><option>Corporate</option>
                </select>
            </div>
            <div><label>Location *</label><input type="text" id="location" placeholder="City / Venue"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <div><label>Start Date *</label><input type="date" id="eventDate"></div>
            <div><label>End Date *</label><input type="date" id="endDate"></div>
        </div>
    </div>

    <div style="margin-top: 30px; margin-bottom: 10px; font-weight: bold; color: #333;">
        <i class="fas fa-list"></i> Services / Items
    </div>
    
    <div id="items"></div>
    
    <button class="add-btn" onclick="addItem()" style="margin-top:10px; background:#fff; border:1px dashed #007bff; color:#007bff; padding:10px; width:100%; cursor:pointer; border-radius:8px;">
        <i class="fas fa-plus"></i> ADD NEW ITEM
    </button>

    <div class="total-container">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div><label>Discount (%)</label><input type="number" id="discount" value="0" placeholder="0" oninput="calculate()"></div>
            <div><label>Payment Mode *</label><select id="payMode"><option>Cash</option><option>Online</option></select></div>
            <div><label>Paid Amount *</label><input type="number" id="paidAmount" value="0" placeholder="0" oninput="calculate()"></div>
        </div>

        <div style="text-align: right; font-size: 15px; line-height: 2;">
            <div>Subtotal: <span style="font-weight: 600;">₹<span id="subTotal">0</span></span></div>
            <div style="font-size: 18px; font-weight: bold; color: #333;">Grand Total: ₹<span id="grandTotal">0</span></div>
            <div style="color: #e74c3c; font-weight: bold;">Remaining Balance: ₹<span id="remainingBal">0</span></div>
        </div>
    </div>

    <div class="actions" style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 15px;">
        <button onclick="window.location.href='index.html'" style="padding: 12px 25px; background: transparent; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;">Cancel</button>
        <button id="submitBtn" class="btn-primary" onclick="createQuotation()">
            <i class="fas fa-check-circle"></i> CREATE QUOTATION
        </button>
    </div>
</div>

<script src="../js/create-bill.js"></script>
</body>
</html>
